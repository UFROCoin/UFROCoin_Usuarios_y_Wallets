services:
  mongo:
    image: mongo:4.4
    container_name: ufrocoin-mongo-a
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_a:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo-init:
    image: mongo:4.4
    container_name: ufrocoin-mongo-init-a
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    command:
      [
        "sh",
        "-c",
        "mongo --host mongo:27017 --eval \"var status = rs.status(); if (status.ok !== 1) { rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'mongo:27017'}]}); }\" && until mongo --host mongo:27017 --quiet --eval \"rs.isMaster().ismaster\" | grep true; do sleep 1; done",
      ]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ufrocoin-api-a
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      MONGODB_URL: mongodb://mongo:27017/?replicaSet=rs0
      SECRET_KEY: ${SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-UFROCoin <no-reply@ufrocoin.email>}
      RESEND_RESET_SUBJECT: ${RESEND_RESET_SUBJECT:-Recuperacion de contrasena UFROCoin}
      PASSWORD_RESET_BASE_URL: ${PASSWORD_RESET_BASE_URL:-http://localhost:5173/reset-password}
      RESEND_TIMEOUT_SECONDS: ${RESEND_TIMEOUT_SECONDS:-10}
    ports:
      - "8001:8001"

volumes:
  mongo_data_a:
