services:
  mongo:
    image: mongo:8.0
    container_name: ufrocoin-mongo-a
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_a:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo-init:
    image: mongo:8.0
    container_name: ufrocoin-mongo-init-a
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    command:
      [
        "sh",
        "-c",
        "mongosh --host mongo:27017 --eval \"try { rs.status() } catch (e) { rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'mongo:27017'}]}) }\"",
      ]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ufrocoin-api-a
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      MONGODB_URL: mongodb://mongo:27017/?replicaSet=rs0
    ports:
      - "8001:8001"

volumes:
  mongo_data_a:
